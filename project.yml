name: KVMConsole
options:
  bundleIdPrefix: io.lyx
  deploymentTarget:
    macOS: "15.0"
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en
packages:
  KVMCore:
    path: KVMCore
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9URLHJ84PY
targets:
  KVMConsole:
    type: application
    platform: macOS
    sources:
      - path: KVMConsole
        excludes:
          - "Assets.xcassets"
          - "Resources/Info.plist"
      - path: KVMConsole/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: KVMCore
    info:
      path: KVMConsole/Resources/Info.plist
      properties:
        CFBundleName: KVM Console
        CFBundleDisplayName: KVM Console
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "© 2026 Yu-Xi Lim"
        NSLocalNetworkUsageDescription: "KVM Console connects to your KVM device over the local network."
        NSCameraUsageDescription: "KVM Console captures live video from your USB KVM stick (NanoKVM USB)."
    entitlements:
      path: KVMConsole/Resources/KVMConsole.entitlements
      properties:
        # The macOS app is NOT App-Sandboxed. The NanoKVM USB support needs
        # raw tty ioctls (tcsetattr/tcgetattr) on /dev/cu.* to configure the CH9329
        # serial bridge, which the App Sandbox blocks even with a file-access
        # temporary exception. We rely on the hardened runtime + Developer ID
        # notarization instead (the release pipeline does not require sandboxing).
        # Camera remains as a hardened-runtime resource-access entitlement for UVC capture.
        com.apple.security.device.camera: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lyx.KVMConsole
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
  KVMConsoleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - KVMConsoleTests
    dependencies:
      - target: KVMConsole
      - package: KVMCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lyx.KVMConsoleTests
        GENERATE_INFOPLIST_FILE: YES
  KVMConsoleiPad:
    type: application
    platform: iOS
    sources:
      - path: KVMConsoleiPad
        excludes:
          - "Assets.xcassets"
          - "Resources/Info.plist"
      - path: KVMConsoleiPad/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: KVMCore
    info:
      path: KVMConsoleiPad/Resources/Info.plist
      properties:
        CFBundleName: KVM Console
        CFBundleDisplayName: KVM Console
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        GCSupportsControllerUserInteraction: true
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "KVM Console connects to your KVM device over the local network."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: KVMConsoleiPad/Resources/KVMConsole.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lyx.KVMConsole
        TARGETED_DEVICE_FAMILY: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  KVMConsoleiPadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KVMConsoleiPadTests
    dependencies:
      - target: KVMConsoleiPad
      - package: KVMCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lyx.KVMConsoleiPadTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  KVMConsole:
    build:
      targets:
        KVMConsole: all
        KVMConsoleTests: [test]
    test:
      targets:
        - KVMConsoleTests
  KVMConsoleiPad:
    build:
      targets:
        KVMConsoleiPad: all
        KVMConsoleiPadTests: [test]
    test:
      targets:
        - KVMConsoleiPadTests
